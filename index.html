<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Realistic Puzzle Game</title>
<style>
  body {
    margin: 0;
    font-family: Arial;
    text-align: center;
    color: white;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
  }

  h1 {
    margin-top: 20px;
    text-shadow: 2px 2px 5px black;
  }

  .btn {
    margin: 10px;
    border: none;
    cursor: pointer;
    border-radius: 12px;
    font-weight: bold;
    transition: 0.3s;
  }

  .btn:hover {
    transform: scale(1.1);
  }

  .easy { width: 80px; height: 40px; background: lightgreen; }
  .medium { width: 120px; height: 60px; background: gold; }
  .hard { width: 160px; height: 80px; background: orange; }
  .extreme { width: 220px; height: 110px; background: red; }
  .insane { width: 320px; height: 160px; background: purple; }

  #gameArea {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    gap: 40px;
    margin-top: 20px;
  }

  #board {
    display: grid;
    gap: 4px;
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .cell {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
  }

  .piece {
    width: 80px;
    height: 80px;
    cursor: grab;
    border-radius: 15px;
    box-shadow: 0 5px 10px rgba(0,0,0,0.5);
    transition: 0.2s;
  }

  .piece:hover {
    transform: scale(1.05);
  }

  #pieces {
    display: grid;
    gap: 10px;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 15px;
  }

  footer {
    margin-top: 30px;
    padding: 10px;
    color: #ddd;
  }
</style>
</head>
<body>

<h1>🧩 Realistic Puzzle Game</h1>
<p>Created by Adham</p>

<button class="btn easy" onclick="startGame(2)">Easy</button>
<button class="btn medium" onclick="startGame(3)">Medium</button>
<button class="btn hard" onclick="startGame(4)">Hard</button>
<button class="btn extreme" onclick="startGame(5)">Extreme</button>
<button class="btn insane" onclick="startGame(6)">Insane</button>

<h3 id="turn">Player 1's Turn</h3>
<h3 id="score">Player 1: 0 | Player 2: 0</h3>

<div id="gameArea">
  <div id="board"></div>
  <div id="pieces"></div>
</div>

<script>
let size;
let currentPlayer = 1;
let scores = {1:0, 2:0};

const images = [];
for (let i = 1; i <= 1000; i++) {
  images.push(`https://picsum.photos/400?random=${i}`);
}

function getRandomImage() {
  return images[Math.floor(Math.random() * images.length)];
}

function startGame(n) {
  size = n;
  currentPlayer = 1;
  document.getElementById('turn').innerText = "Player 1's Turn";

  const imageURL = getRandomImage();

  const board = document.getElementById('board');
  const piecesDiv = document.getElementById('pieces');

  board.innerHTML = '';
  piecesDiv.innerHTML = '';

  board.style.gridTemplateColumns = `repeat(${size}, 80px)`;
  piecesDiv.style.gridTemplateColumns = `repeat(${Math.ceil(size)}, 80px)`;

  let pieces = [];

  for (let i = 0; i < size * size; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.index = i;

    cell.ondragover = e => e.preventDefault();

    cell.ondrop = function(e) {
      const pieceId = e.dataTransfer.getData('text');
      const piece = document.getElementById(pieceId);

      if (piece.dataset.correct == this.dataset.index) {
        this.appendChild(piece);
        piece.draggable = false;
        piece.style.cursor = 'default';
        piece.style.boxShadow = 'none';
        checkWin();
      }
    };

    board.appendChild(cell);
  }

  for (let row = 0; row < size; row++) {
    for (let col = 0; col < size; col++) {
      const index = row * size + col;

      const piece = document.createElement('div');
      piece.className = 'piece';
      piece.id = 'piece' + index;
      piece.draggable = true;
      piece.dataset.correct = index;

      piece.style.backgroundImage = `url(${imageURL})`;
      piece.style.backgroundSize = `${size * 80}px ${size * 80}px`;
      piece.style.backgroundPosition = `-${col * 80}px -${row * 80}px`;

      piece.ondragstart = function(e) {
        e.dataTransfer.setData('text', this.id);
      };

      pieces.push(piece);
    }
  }

  pieces.sort(() => Math.random() - 0.5);
  pieces.forEach(p => piecesDiv.appendChild(p));
}

function switchPlayer(){
  currentPlayer = currentPlayer === 1 ? 2 : 1;
  document.getElementById('turn').innerText = "Player " + currentPlayer + "'s Turn";
}

function checkWin() {
  const cells = document.querySelectorAll('.cell');
  let correct = 0;

  cells.forEach(cell => {
    if (cell.children.length === 1 &&
        cell.children[0].dataset.correct == cell.dataset.index) {
      correct++;
    }
  });

  if (correct === size * size) {
    scores[currentPlayer]++;
    alert('🎉 Player ' + currentPlayer + ' wins!');
    document.getElementById('score').innerText =
      `Player 1: ${scores[1]} | Player 2: ${scores[2]}`;
  } else {
    switchPlayer();
  }
}
</script>

<footer>
  © 2026 Adham Mahmoud Adel Omran
</footer>

</body>
</html>
